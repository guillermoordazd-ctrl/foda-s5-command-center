name: Construir Ejecutable FODA S5

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar la aplicación con PyInstaller
        # Usamos los mismos flags optimizados que configuramos en compilar_a_exe.bat
        run: >
          pyinstaller --clean --noconfirm --onedir --windowed 
          --name="FODA_S5_Command_Center" 
          --icon="my_foda_s5.ico" 
          --exclude-module="tkinter" 
          --exclude-module="unittest" 
          --exclude-module="pydoc" 
          --additional-hooks-dir="hooks" 
          --add-data "main.py;." 
          --add-data "pdf_utils.py;." 
          --add-data "models.py;." 
          --add-data "database.py;." 
          --add-data "charts.py;." 
          --add-data "nlp_mapper.py;." 
          --add-data "styles.css;." 
          --add-data ".streamlit;.streamlit" 
          run_foda_s5.py

      - name: Compilar instalador con Inno Setup
        # GitHub Actions 'windows-latest' ya tiene Inno Setup preinstalado en la ruta por defecto
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador_foda_s5.iss

      - name: Subir Instalador Generado a Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Setup_FODA_S5_Command_Center
          path: dist/Setup_FODA_S5_Command_Center.exe

      - name: Publicar directo en GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Versión 1.0.${{ github.run_number }}"
          body: "Ejecutable automatizado FODA S5 Command Center (Modo Optimizado --onedir)"
          files: dist/Setup_FODA_S5_Command_Center.exe
